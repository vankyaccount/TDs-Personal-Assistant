version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tds-postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: tduser
      POSTGRES_PASSWORD: tdpassword
      POSTGRES_DB: tdsassistant
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tduser"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tds-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tds-app
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://tduser:tdpassword@postgres:5432/tdsassistant
      JWT_SECRET: ${JWT_SECRET:-tds-jwt-secret-change-in-production}
      GLM_API_KEY: ${GLM_API_KEY}
      GLM_API_URL: https://api.z.ai/api/paas/v4/chat/completions
      GLM_MODEL: glm-4.7
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tds-network

volumes:
  postgres_data:

networks:
  tds-network:
    driver: bridge
